<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trifalic47 // Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <svg id="noise-svg">
        <filter id="noiseFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
        </filter>
        <rect width="100%" height="100%" filter="url(#noiseFilter)" />
    </svg>

    <div class="crt-overlay"></div>

    <div id="boot-screen"></div>

    <nav>
        <div class="logo">[trifalic47]</div>
        <ul>
            <li><a href="#hero">~/home</a></li>
            <li><a href="#about">~/about</a></li>
            <li><a href="#projects">~/projects</a></li>
            <li><a href="#contact">~/contact</a></li>
        </ul>
    </nav>

    <section id="hero">
        <div class="glitch-wrapper">
            <h1 class="glitch">trifalic47</h1>
        </div>
        <p class="tagline" id="hero-tagline"></p>
        <div class="stats-block reveal" id="hero-stats">
            <p><span class="cmd-prefix">$</span> cat /etc/motd</p>
            <p id="motd-content">Fetching data...</p>
            <p><br></p>
            <p><span class="cmd-prefix">$</span> uptime</p>
            <p id="uptime-content">Scanning system... <span class="cursor"></span></p>
        </div>
    </section>

    <section id="about">
        <div class="profile-container reveal">
            <img id="profile-img" src="" alt="Trifalic47" loading="lazy">
        </div>
        <div class="about-content">
            <h2 class="section-header"><span class="prompt">></span><span class="title">about</span></h2>
            <div id="bio-text"></div>
        </div>
    </section>

    <section id="projects">
        <h2 class="section-header"><span class="prompt">></span><span class="title">projects</span></h2>
        <div class="projects-grid" id="repos-container">
            <p>Loading projects from GitHub...</p>
        </div>
    </section>

    <section id="contact">
        <h2 class="section-header"><span class="prompt">></span><span class="title">contact</span></h2>
        <ul class="contact-list reveal" id="contact-list">
            <li class="contact-item">
                <span class="cmd-prefix">$</span>connect --github <span class="arrow">→</span>
                <a href="https://github.com/Trifalic47" target="_blank" id="gh-link">github.com/Trifalic47</a>
            </li>
        </ul>
    </section>

    <footer>
        &copy; 2024-2026 TRIFALIC47 // EXPLOIT EVERYTHING
    </footer>

</body>
</html>
